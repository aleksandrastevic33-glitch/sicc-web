  <!-- S -->
  <path d="M22 28 C22 28 62 22 68 38 C74 54 32 50 30 66 C28 82 72 78 72 78"
        stroke="#000" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- / (I) -->
  <line x1="102" y1="20" x2="82" y2="90" stroke="#000" stroke-width="14" stroke-linecap="round"/>

  <!-- C (left bracket) -->
  <path d="M170 24 C150 24 120 38 120 55 C120 72 150 82 170 82"
        stroke="#000" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- C (right bracket, slightly open) -->
